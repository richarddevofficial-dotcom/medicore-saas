services:
  postgres:
    image: postgres:16
    container_name: medicore-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: medicore-redis
    restart: always

  backend:
    build:
      context: ./backend
    container_name: medicore-backend
    restart: always
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://api.medicorecloud.com/api/v1
        NEXT_PUBLIC_PLATFORM_DOMAIN: medicorecloud.com
    container_name: medicore-frontend
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.medicorecloud.com/api/v1
      NEXT_PUBLIC_PLATFORM_DOMAIN: medicorecloud.com
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  static_volume:
  media_volume:
