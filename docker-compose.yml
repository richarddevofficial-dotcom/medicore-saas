services:

  postgres:
    image: postgres:16
    container_name: medicore-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"


  redis:
    image: redis:7
    container_name: medicore-redis
    restart: always
    ports:
      - "6379:6379"


  backend:
    build:
      context: ./backend

    container_name: medicore-backend

    restart: always

    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000

    volumes:
      - ./backend:/app
      - static_volume:/app/static
      - media_volume:/app/media

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - postgres
      - redis


volumes:
  postgres_data:
  static_volume:
  media_volume:
