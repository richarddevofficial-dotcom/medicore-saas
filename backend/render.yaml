services:
  - type: web
    name: medicore-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: |
      python manage.py migrate ;
      python manage.py collectstatic --noinput ;
      gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /api/v1/health/
    envVars:
      - key: DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: api.medicore.com,medicore.com,www.medicore.com
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        value: https://medicore.com,https://www.medicore.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://medicore.com,https://www.medicore.com
      - key: FRONTEND_APP_URL
        value: https://medicore.com
      - key: PLATFORM_BASE_DOMAIN
        value: medicore.com
      - key: PLATFORM_SUBDOMAIN_MODE
        value: "true"
      - key: PLATFORM_HOSTS
        value: medicore.com,www.medicore.com,api.medicore.com
      - key: ENABLE_TENANT_HOST_ENFORCEMENT
        value: "true"
      - key: ENABLE_DYNAMIC_CORS_GUARD
        value: "true"
      - key: DB_SSLMODE
        value: require
